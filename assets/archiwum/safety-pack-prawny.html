<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Pack Prawny – Umowa AI + RODO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #161b27;
  --surface2: #1c2235;
  --border: rgba(100,120,180,0.15);
  --border2: rgba(100,120,180,0.25);
  --accent: #4f7cff;
  --accent2: #7c5cfc;
  --gold: #e8b84b;
  --green: #34d399;
  --red: #f87171;
  --text: #e2e8f4;
  --muted: #64748b;
  --muted2: #8898b0;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* bg mesh */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 10%, rgba(79,124,255,0.06), transparent),
    radial-gradient(ellipse 400px 500px at 80% 80%, rgba(124,92,252,0.05), transparent);
  pointer-events: none; z-index: 0;
}

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 100vh;
  position: relative; z-index: 1;
}
@media(max-width:900px){ .layout { grid-template-columns:1fr; } }

/* SIDEBAR */
aside {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 32px 24px;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; overflow-x: hidden;
}
@media(max-width:900px){ aside { position:static; height:auto; } }

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px; padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-size: 14px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--muted); }

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px; margin-top: 24px;
}
.section-label:first-of-type { margin-top: 0; }

.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; font-weight: 500; }
input[type=text], input[type=email], textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s;
  resize: vertical;
}
input[type=text]:focus, input[type=email]:focus, textarea:focus, select:focus {
  outline: none;
  border-color: rgba(79,124,255,0.5);
  box-shadow: 0 0 0 3px rgba(79,124,255,0.08);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
select { cursor: pointer; }
select option { background: var(--surface2); }

.checkbox-group { display: flex; flex-direction: column; gap: 8px; }
.checkbox-item {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; font-size: 12px; color: var(--muted2);
  padding: 8px; border-radius: 6px;
  border: 1px solid transparent; transition: all 0.2s;
}
.checkbox-item:hover { background: var(--surface2); border-color: var(--border); }
.checkbox-item input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.checkbox-item span { color: var(--text); font-size: 12px; }

.sidebar-btns { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
.btn-generate {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; border: none; border-radius: 10px;
  padding: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.01em;
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,124,255,0.3); }
.btn-print {
  background: transparent; color: var(--muted2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.2s;
}
.btn-print:hover { border-color: var(--border2); color: var(--text); }

/* MAIN DOC AREA */
main {
  padding: 48px 60px;
  max-width: 860px;
}
@media(max-width:900px){ main { padding: 32px 20px; } }

.doc-tabs {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 4px;
  margin-bottom: 36px; width: fit-content;
}
.tab {
  padding: 8px 20px; border-radius: 7px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; color: var(--muted2);
}
.tab.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; box-shadow: 0 2px 12px rgba(79,124,255,0.3);
}
.tab:not(.active):hover { color: var(--text); background: var(--surface2); }

/* DOCUMENT */
.document {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.doc-toolbar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.doc-toolbar-left { display: flex; align-items: center; gap: 8px; }
.doc-badge {
  background: rgba(79,124,255,0.12);
  border: 1px solid rgba(79,124,255,0.2);
  color: var(--accent); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; padding: 3px 10px; border-radius: 4px;
  text-transform: uppercase;
}
.doc-version { font-size: 11px; color: var(--muted); }
.btn-copy {
  background: transparent; color: var(--muted2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 14px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.btn-copy:hover { border-color: var(--border2); color: var(--text); }

.doc-body {
  padding: 48px 52px;
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  max-height: 75vh;
  overflow-y: auto;
}
@media(max-width:600px){ .doc-body { padding: 28px 20px; } }

/* Document styles */
.doc-body h1 {
  font-size: 22px; font-weight: 400; font-style: italic;
  letter-spacing: -0.01em; margin-bottom: 8px;
  color: var(--text); text-align: center;
}
.doc-body h2 {
  font-size: 13px; font-weight: 400; font-family: 'DM Sans', sans-serif;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--accent); margin: 28px 0 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.doc-body h3 {
  font-size: 12px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.05em; margin: 16px 0 8px; color: var(--muted2);
}
.doc-body p { margin-bottom: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.doc-body .meta {
  text-align: center; margin-bottom: 32px; padding: 20px;
  background: var(--surface2); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted2);
  border: 1px solid var(--border);
}
.doc-body .meta strong { color: var(--text); }
.highlight {
  background: rgba(232,184,75,0.08);
  border: 1px solid rgba(232,184,75,0.2);
  border-radius: 6px; padding: 12px 16px;
  margin: 16px 0;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--gold);
}
.placeholder {
  background: rgba(79,124,255,0.1);
  border: 1px dashed rgba(79,124,255,0.3);
  border-radius: 4px; padding: 2px 8px;
  color: var(--accent); font-style: italic;
  font-family: 'DM Sans', monospace; font-size: 12px;
}
ol, ul { padding-left: 20px; margin-bottom: 10px; }
li { font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.7; margin-bottom: 4px; }
.sign-section {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 40px; margin-top: 48px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.sign-block { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted2); }
.sign-line { border-top: 1px solid var(--muted); margin: 32px 0 8px; }
.doc-footer {
  text-align: center; margin-top: 40px; padding-top: 16px;
  border-top: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted);
}

/* Compliance checklist */
.checklist-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; margin-top: 20px;
}
.cl-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.cl-item:last-child { border-bottom: none; }
.cl-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.cl-text h4 { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.cl-text p { font-size: 12px; color: var(--muted2); line-height: 1.5; }
.cl-status {
  margin-left: auto; flex-shrink: 0;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 4px;
}
.cl-ok { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.cl-warn { background: rgba(232,184,75,0.1); color: var(--gold); border: 1px solid rgba(232,184,75,0.2); }
.cl-err { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

@media print {
  aside, .doc-tabs, .doc-toolbar, .checklist-panel { display: none !important; }
  .layout { display: block; }
  main { padding: 0; max-width: 100%; }
  .document { border: none; border-radius: 0; }
  .doc-body { max-height: none; overflow: visible; color: #111; background: white; padding: 20px; }
  .doc-body h1, .doc-body h2, .doc-body h3 { color: #111 !important; }
  .doc-body .meta { background: #f5f5f5; color: #444; }
  .highlight { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
  .placeholder { color: #1d4ed8; background: #eff6ff; border-color: #93c5fd; }
  body::before { display:none; }
  .sign-block { color: #444; }
  .doc-footer { color: #999; }
}
</style>
</head>
<body>

<div class="layout">
  <aside>
    <div class="sidebar-logo">
      <div class="logo-icon">🛡️</div>
      <div>
        <div class="logo-text">Safety Pack Prawny</div>
        <div class="logo-sub">Umowa + RODO generator</div>
      </div>
    </div>

    <div class="section-label">Dane Zleceniodawcy (Klient)</div>
    <div class="form-group"><label>Pełna nazwa firmy</label><input type="text" id="klientNazwa" placeholder="Kowalski Sp. z o.o." oninput="renderDoc()"></div>
    <div class="form-group"><label>NIP</label><input type="text" id="klientNip" placeholder="123-456-78-90" oninput="renderDoc()"></div>
    <div class="form-group"><label>Adres</label><input type="text" id="klientAdres" placeholder="ul. Kwiatowa 1, 00-001 Warszawa" oninput="renderDoc()"></div>
    <div class="form-group"><label>Reprezentant (imię i nazwisko)</label><input type="text" id="klientRep" placeholder="Jan Kowalski, Prezes" oninput="renderDoc()"></div>
    <div class="form-group"><label>Email</label><input type="email" id="klientEmail" placeholder="biuro@integracjebiznesowe.pl" oninput="renderDoc()"></div>

    <div class="section-label">Dane Wykonawcy (Twoja firma)</div>
    <div class="form-group"><label>Twoja firma / imię i nazwisko</label><input type="text" id="execNazwa" placeholder="AI Solutions Marek Nowak" oninput="renderDoc()"></div>
    <div class="form-group"><label>NIP wykonawcy</label><input type="text" id="execNip" placeholder="987-654-32-10" oninput="renderDoc()"></div>
    <div class="form-group"><label>Adres wykonawcy</label><input type="text" id="execAdres" placeholder="ul. Technologiczna 5, 00-002 Warszawa" oninput="renderDoc()"></div>
    <div class="form-group"><label>Email wykonawcy</label><input type="email" id="execEmail" placeholder="biuro@aiagency.pl" oninput="renderDoc()"></div>

    <div class="section-label">Parametry umowy</div>
    <div class="form-group">
      <label>Zakres usług AI</label>
      <select id="zakres" onchange="renderDoc()">
        <option value="agent24">Agent 24/7 (WhatsApp/SMS/CRM)</option>
        <option value="audyt">Agent Audytor Stron WWW</option>
        <option value="rag">System RAG – Baza Wiedzy</option>
        <option value="social">Automatyzacja Social Media</option>
        <option value="ksef">Agent KSeF Faktury</option>
        <option value="custom">Indywidualny zakres</option>
      </select>
    </div>
    <div class="form-group"><label>Wynagrodzenie wdrożeniowe (zł brutto)</label><input type="text" id="kwotaSetup" placeholder="8 000" oninput="renderDoc()"></div>
    <div class="form-group"><label>Miesięczny abonament (zł brutto)</label><input type="text" id="kwotaMiesiac" placeholder="1 200" oninput="renderDoc()"></div>
    <div class="form-group"><label>Czas wdrożenia (dni roboczych)</label><input type="text" id="czasWdrozenia" placeholder="21" oninput="renderDoc()"></div>
    <div class="form-group"><label>Czas trwania umowy</label>
      <select id="czasUmowy" onchange="renderDoc()">
        <option value="bezterminowa">Bezterminowa z okresem wypowiedzenia</option>
        <option value="12">12 miesięcy</option>
        <option value="6">6 miesięcy</option>
        <option value="3">3 miesiące</option>
      </select>
    </div>
    <div class="form-group"><label>Karencja wypowiedzenia</label>
      <select id="wypowiedzenie" onchange="renderDoc()">
        <option value="30">30 dni</option>
        <option value="14">14 dni</option>
        <option value="60">60 dni</option>
        <option value="90">90 dni</option>
      </select>
    </div>

    <div class="section-label">Dodatkowe klauzule</div>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox" id="kl_kara" onchange="renderDoc()" checked> <span>Kara umowna za wcześniejsze rozwiązanie</span></label>
      <label class="checkbox-item"><input type="checkbox" id="kl_nda" onchange="renderDoc()" checked> <span>Klauzula poufności (NDA)</span></label>
      <label class="checkbox-item"><input type="checkbox" id="kl_rodo" onchange="renderDoc()" checked> <span>Powierzenie przetwarzania danych (RODO)</span></label>
      <label class="checkbox-item"><input type="checkbox" id="kl_sla" onchange="renderDoc()" checked> <span>SLA (poziom dostępności usług)</span></label>
      <label class="checkbox-item"><input type="checkbox" id="kl_ip" onchange="renderDoc()" checked> <span>Prawa własności intelektualnej</span></label>
    </div>

    <div class="sidebar-btns">
      <button class="btn-generate" onclick="renderDoc()">⚡ Generuj dokument</button>
      <button class="btn-print" onclick="window.print()">🖨️ Drukuj / Pobierz PDF</button>
    </div>
  </aside>

  <main>
    <div class="doc-tabs">
      <div class="tab active" onclick="switchTab('umowa', this)">📄 Umowa o Współpracy</div>
      <div class="tab" onclick="switchTab('rodo', this)">🔒 Klauzula RODO</div>
      <div class="tab" onclick="switchTab('checklist', this)">✅ Compliance Check</div>
    </div>

    <!-- UMOWA -->
    <div id="tab-umowa" class="document">
      <div class="doc-toolbar">
        <div class="doc-toolbar-left">
          <div class="doc-badge">Umowa</div>
          <div class="doc-version">Wersja 2.1 / 2025</div>
        </div>
        <button class="btn-copy" onclick="copyDoc('doc-umowa-body')">📋 Kopiuj tekst</button>
      </div>
      <div class="doc-body" id="doc-umowa-body">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- RODO -->
    <div id="tab-rodo" class="document" style="display:none">
      <div class="doc-toolbar">
        <div class="doc-toolbar-left">
          <div class="doc-badge" style="background:rgba(124,92,252,0.12);border-color:rgba(124,92,252,0.2);color:var(--accent2)">RODO</div>
          <div class="doc-version">GDPR Art. 28 / 2025</div>
        </div>
        <button class="btn-copy" onclick="copyDoc('doc-rodo-body')">📋 Kopiuj tekst</button>
      </div>
      <div class="doc-body" id="doc-rodo-body"></div>
    </div>

    <!-- CHECKLIST -->
    <div id="tab-checklist" style="display:none">
      <div class="checklist-panel" id="checklist-panel"></div>
    </div>
  </main>
</div>

<script>
function g(id) { return document.getElementById(id)?.value || ''; }
function gc(id) { return document.getElementById(id)?.checked; }
function ph(text, fallback='[uzupełnij]') { return text || `<span class="placeholder">${fallback}</span>`; }
function today() { return new Date().toLocaleDateString('pl-PL',{year:'numeric',month:'long',day:'numeric'}); }

const zakresy = {
  agent24: 'wdrożenie i utrzymanie Systemu Agentów AI 24/7, obsługującego komunikację z klientami przez kanały WhatsApp i SMS, automatyczne umawianie wizyt oraz synchronizację z systemem CRM Zleceniodawcy',
  audyt: 'wdrożenie i utrzymanie Agenta Audytor Stron WWW, automatycznie analizującego strony internetowe, generującego raporty SEO/UX oraz rekomendacje w zakresie optymalizacji',
  rag: 'wdrożenie i utrzymanie Systemu RAG (Retrieval-Augmented Generation) – bazy wiedzy firmowej z interfejsem chatbota, umożliwiającej przeszukiwanie dokumentów firmowych w języku naturalnym',
  social: 'wdrożenie i utrzymanie systemu Automatyzacji Social Media, generującego i publikującego treści na platformach LinkedIn, Instagram i X (Twitter)',
  ksef: 'wdrożenie i utrzymanie Agenta Faktur Kosztowych z integracją KSeF (Krajowy System e-Faktur), automatycznej weryfikacji kontrahentów na Białej Liście VAT oraz kategoryzacji faktur',
  custom: 'indywidualnie uzgodniony zakres automatyzacji procesów biznesowych z wykorzystaniem technologii Sztucznej Inteligencji, zgodnie z załącznikiem nr 1 do niniejszej Umowy',
};

function renderDoc() {
  const klient = ph(g('klientNazwa'),'[NAZWA KLIENTA]');
  const kNip = ph(g('klientNip'),'[NIP]');
  const kAdres = ph(g('klientAdres'),'[ADRES]');
  const kRep = ph(g('klientRep'),'[REPREZENTANT]');
  const kEmail = ph(g('klientEmail'),'[EMAIL]');
  const exec = ph(g('execNazwa'),'[NAZWA WYKONAWCY]');
  const eNip = ph(g('execNip'),'[NIP]');
  const eAdres = ph(g('execAdres'),'[ADRES]');
  const eEmail = ph(g('execEmail'),'[EMAIL]');
  const zakresText = zakresy[g('zakres') || 'agent24'];
  const kwotaS = ph(g('kwotaSetup'),'[KWOTA]');
  const kwotaM = ph(g('kwotaMiesiac'),'[KWOTA]');
  const czasW = ph(g('czasWdrozenia'),'21');
  const wypow = g('wypowiedzenie') || '30';
  const czasU = g('czasUmowy') || 'bezterminowa';

  const klKara = gc('kl_kara');
  const klNda = gc('kl_nda');
  const klRodo = gc('kl_rodo');
  const klSla = gc('kl_sla');
  const klIp = gc('kl_ip');

  const umowaCzas = czasU === 'bezterminowa'
    ? `Umowa zawierana jest na czas nieokreślony. Każda ze Stron może wypowiedzieć Umowę z zachowaniem ${wypow}-dniowego okresu wypowiedzenia, ze skutkiem na ostatni dzień miesiąca kalendarzowego.`
    : `Umowa zawierana jest na czas określony ${czasU} (${czasU} miesięcy) od daty podpisania. Po upływie okresu umowa ulega przedłużeniu na czas nieokreślony, chyba że jedna ze Stron złoży wypowiedzenie z zachowaniem ${wypow}-dniowego okresu.`;

  let html = `
<h1>Umowa o Świadczenie Usług Automatyzacji AI</h1>
<div class="meta">
  Zawarta dnia ${today()}<br><br>
  <strong>ZLECENIODAWCA:</strong> ${klient} NIP: ${kNip}, ${kAdres}, reprezentowana przez: ${kRep}, email: ${kEmail}<br><br>
  <strong>WYKONAWCA:</strong> ${exec}, NIP: ${eNip}, ${eAdres}, email: ${eEmail}
</div>

<h2>§ 1. Przedmiot Umowy</h2>
<p>1. Wykonawca zobowiązuje się do świadczenia usług polegających na ${zakresText} (dalej: „System AI" lub „Usługi").</p>
<p>2. Szczegółowy zakres wdrożenia, harmonogram oraz specyfikacja techniczna stanowią Załącznik nr 1 do niniejszej Umowy.</p>
<p>3. Wykonawca oświadcza, że posiada odpowiednią wiedzę, doświadczenie i narzędzia niezbędne do należytego wykonania Umowy.</p>

<h2>§ 2. Wynagrodzenie i Płatności</h2>

<h2>§ 1. Przedmiot i Cel Przetwarzania</h2>

<p>2. <strong>Rodzaj danych:</strong> dane identyfikacyjne (imię, nazwisko), dane kontaktowe (numer telefonu, adres e-mail), historia komunikacji z systemem AI, dane dotyczące wizyt i transakcji.</p>
<p>3. <strong>Kategorie osób:</strong> klienci i potencjalni klienci Administratora.</p>

<h2>§ 7. Audyt i Inspekcja</h2>
<p>Administrator ma prawo do przeprowadzenia audytu zgodności Procesora z niniejszą Umową nie częściej niż raz w roku. Procesor zobowiązuje się umożliwić przeprowadzenie audytu z 14-dniowym wyprzedzeniem, w godzinach roboczych i bez zakłócania normalnej działalności.</p>

function renderChecklist() {

  const hasExec = g('execNazwa') && g('execNip');
  const hasKwoty = g('kwotaSetup') && g('kwotaMiesiac');

  const items = [
    { ok: hasKlient, warn: false, icon: '🏢', title: 'Dane Zleceniodawcy', desc: hasKlient ? 'Nazwa firmy i NIP uzupełnione.' : 'Uzupełnij nazwę firmy i NIP Zleceniodawcy.' },
    { ok: hasExec, warn: false, icon: '👤', title: 'Dane Wykonawcy', desc: hasExec ? 'Dane Wykonawcy uzupełnione.' : 'Uzupełnij dane swojej firmy.' },
    { ok: hasKwoty, warn: false, icon: '💰', title: 'Wynagrodzenie', desc: hasKwoty ? 'Kwoty wdrożenia i abonamentu zdefiniowane.' : 'Uzupełnij kwotę wdrożenia i abonament.' },
    { ok: kl.rodo, warn: !kl.rodo, icon: '🔒', title: 'Klauzula RODO (art. 28)', desc: kl.rodo ? 'Umowa Powierzenia Danych wygenerowana — kluczowa dla klientów korporacyjnych.' : 'Zalecane! Bez tej klauzuli korporacje nie podpiszą umowy.' },
    { ok: kl.nda, warn: !kl.nda, icon: '🤫', title: 'Klauzula NDA', desc: kl.nda ? 'Poufność zabezpieczona — chroni Twoje know-how i dane klienta.' : 'Zalecane — bez NDA możesz stracić poufne dane.' },
    { ok: kl.sla, warn: !kl.sla, icon: '⏱️', title: 'SLA (dostępność usług)', desc: kl.sla ? 'Gwarancja 99% uptime zdefiniowana.' : 'Klienci enterprise wymagają SLA. Zalecane.' },
    { ok: kl.ip, warn: !kl.ip, icon: '©️', title: 'Prawa własności intelektualnej', desc: kl.ip ? 'Licencja i prawa do kodu/danych zdefiniowane.' : 'Bez tej klauzuli mogą pojawić się spory o własność systemu.' },
    { ok: kl.kara, warn: false, icon: '⚖️', title: 'Kara umowna', desc: kl.kara ? 'Zabezpieczenie finansowe dla obu Stron.' : 'Opcjonalne — niektórzy klienci mogą protestować.' },
    { ok: true, warn: false, icon: '🗓️', title: 'Termin wdrożenia i wypowiedzenia', desc: `Wdrożenie: ${g('czasWdrozenia') || '21'} dni roboczych. Wypowiedzenie: ${g('wypowiedzenie') || '30'} dni.` },
  ];

  const score = items.filter(i => i.ok).length;
  const pct = Math.round((score / items.length) * 100);

  const panel = document.getElementById('checklist-panel');
  panel.innerHTML = `
    <div style="margin-bottom:24px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between">
        <span>Kompletność dokumentacji</span>
        <span style="color:${pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--gold)' : 'var(--red)'}">${pct}%</span>
      </div>
      <div style="background:var(--surface2);border-radius:4px;height:8px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s;border-radius:4px"></div>
      </div>
    </div>
    ${items.map(i => `
      <div class="cl-item">
        <div class="cl-icon">${i.icon}</div>
        <div class="cl-text">
          <h4>${i.title}</h4>

        <div class="cl-status ${i.ok ? 'cl-ok' : i.warn ? 'cl-warn' : 'cl-err'}">${i.ok ? '✓ OK' : i.warn ? '⚠ Zalecane' : '✗ Brak'}</div>
      </div>
    `).join('')}
    <div style="margin-top:20px;padding:16px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted2);line-height:1.6">
      ⚠️ <strong>Ważne:</strong> Ten generator tworzy wzorzec umowy. Przed podpisaniem z klientem korporacyjnym zalecamy konsultację z radcą prawnym lub adwokatem specjalizującym się w prawie IT/AI.
    </div>
  `;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-umowa').style.display = tab === 'umowa' ? 'block' : 'none';
  document.getElementById('tab-rodo').style.display = tab === 'rodo' ? 'block' : 'none';
  document.getElementById('tab-checklist').style.display = tab === 'checklist' ? 'block' : 'none';
}

function copyDoc(bodyId) {
  const el = document.getElementById(bodyId);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Skopiowano!';
    setTimeout(() => btn.textContent = '📋 Kopiuj tekst', 2000);
  });
}
