<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" role="img" aria-label="Integracje Biznesowe">
  <!-- Icon mark 44×44 -->
  <rect width="44" height="44" rx="11" fill="#c8f135"/>
  <!-- Hub -->
  <circle cx="22" cy="22" r="5" fill="#06070d"/>
  <!-- Satellite nodes -->
  <circle cx="22" cy="7"  r="3" fill="#06070d"/>
  <circle cx="9"  cy="35" r="3" fill="#06070d"/>
  <circle cx="35" cy="35" r="3" fill="#06070d"/>
  <!-- Lines hub → satellites -->
  <line x1="22" y1="17"   x2="22" y2="10"   stroke="#06070d" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="26.5" x2="11.5" y2="32.5" stroke="#06070d" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="26.5" x2="32.5" y2="32.5" stroke="#06070d" stroke-width="3" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="58" y="17" font-family="'Clash Display', 'Inter', system-ui, sans-serif"
